<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合作愉快 - AI 自主求职招聘平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-gray-900 pb-20">

    <nav class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-30 shadow-sm">
        <div class="flex items-center gap-2">
            <h1 class="text-2xl font-black text-orange-600">合作愉快</h1>
            <span class="bg-green-100 text-green-700 text-[10px] px-2 py-0.5 rounded-full uppercase">AI 实时审核中</span>
        </div>
        <div class="flex gap-2">
            <button onclick="showModal('postModal')" class="bg-orange-500 text-white px-4 py-2 rounded-xl text-xs font-bold">招人</button>
            <button onclick="showModal('talentModal')" class="bg-black text-white px-4 py-2 rounded-xl text-xs font-bold">找活</button>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-4 space-y-8">
        
        <section>
            <h2 class="text-lg font-bold flex items-center gap-2 mb-4">🔍 职位大厅</h2>
            <div id="jobList" class="grid gap-4"></div>
        </section>

        <section>
            <h2 class="text-lg font-bold flex items-center gap-2 mb-4">精选人才</h2>
            <div id="talentList" class="grid gap-4"></div>
        </section>

    </main>

    <div id="postModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl w-full max-w-md p-8 overflow-y-auto max-h-[90vh] shadow-2xl">
            <h3 class="text-2xl font-bold mb-2">发布招聘</h3>
            <p class="text-gray-500 text-sm mb-6">AI 将在 3 秒内完成合规性审核</p>
            <form id="jobForm" class="space-y-4">
                <input type="text" id="j_title" placeholder="职位名称" class="w-full bg-gray-100 p-4 rounded-2xl focus:ring-2 ring-orange-500 outline-none" required>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="j_company" placeholder="店名/公司" class="bg-gray-100 p-4 rounded-2xl outline-none" required>
                    <input type="text" id="j_salary" placeholder="薪资 (例: 5k+包住)" class="bg-gray-100 p-4 rounded-2xl outline-none">
                </div>
                <input type="text" id="j_location" placeholder="工作地点" class="w-full bg-gray-100 p-4 rounded-2xl outline-none">
                <textarea id="j_desc" placeholder="任职要求..." class="w-full bg-gray-100 p-4 rounded-2xl outline-none h-32"></textarea>
                <input type="text" id="j_contact" placeholder="您的私密联系方式 (不公开)" class="w-full border-2 border-orange-100 p-4 rounded-2xl outline-none" required>
                <button type="submit" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold text-lg hover:bg-orange-600 transition">立即提交</button>
                <button type="button" onclick="hideModal('postModal')" class="w-full text-gray-400">返回</button>
            </form>
        </div>
    </div>

    <script>
        const SB_URL = "https://jhzpmmdslymynrhhikyl.supabase.co";
        const SB_KEY = "sb_publishable_b6QotGyfQzDeABQeZaWZcQ_nzRLqeCf"; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function init() {
            renderJobs();
            renderTalents();
        }

        // 渲染职位列表
        async function renderJobs() {
            const { data } = await _supabase.from('jobs').select('*').eq('status', 'active').order('created_at', {ascending: false});
            const container = document.getElementById('jobList');
            container.innerHTML = data.map(j => `
                <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm hover:shadow-md transition">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-xl font-bold">${j.title}</h3>
                        <span class="text-orange-600 font-black">${j.salary}</span>
                    </div>
                    <p class="text-gray-500 text-sm mb-4">${j.company} · ${j.location}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] bg-green-50 text-green-600 px-2 py-1 rounded-md font-bold italic">AI 已验真实</span>
                        <button onclick="requestExchange('${j.id}')" class="bg-orange-100 text-orange-600 px-4 py-2 rounded-xl text-xs font-bold">投递简历</button>
                    </div>
                </div>
            `).join('');
        }

        // 渲染人才列表
        async function renderTalents() {
            const { data } = await _supabase.from('resumes').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('talentList');
            container.innerHTML = data.map(t => `
                <div class="bg-blue-600 p-6 rounded-3xl text-white shadow-lg">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-lg">${t.dream_job || '寻找工作中'}</span>
                        <span class="bg-white/20 px-2 py-1 rounded text-[10px] font-bold">${t.real_name[0]}老师/师傅</span>
                    </div>
                    <p class="text-blue-100 text-xs mb-4 line-clamp-2">${t.experience}</p>
                    <button onclick="alert('交换请求已发送给求职者')" class="w-full bg-white text-blue-600 py-2 rounded-xl text-xs font-bold">请求联系方式</button>
                </div>
            `).join('');
        }

        // 提交职位 (接入自动审核逻辑)
        document.getElementById('jobForm').onsubmit = async (e) => {
            e.preventDefault();
            const jobData = {
                title: document.getElementById('j_title').value,
                company: document.getElementById('j_company').value,
                salary: document.getElementById('j_salary').value,
                location: document.getElementById('j_location').value,
                description: document.getElementById('j_desc').value,
                contact_info: document.getElementById('j_contact').value,
                status: 'active' // 正式环境应改为 'pending' 配合 AI Agent
            };
            const { error } = await _supabase.from('jobs').insert([jobData]);
            if (!error) { alert('发布成功！AI 已完成内容核验并上线。'); location.reload(); }
        };

        function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function hideModal(id) { document.getElementById(id).classList.add('hidden'); }
        
        init();
    </script>
</body>
</html>
