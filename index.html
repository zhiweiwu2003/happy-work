<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合作愉快 - 免费、真实的基层招聘平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-20">
        <h1 class="text-2xl font-black text-orange-600">合作愉快</h1>
        <div class="space-x-2">
            <button onclick="showPostJob()" class="bg-orange-500 text-white px-4 py-2 rounded-full text-sm font-bold">发职位</button>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-4">
        <div class="mb-6">
            <h2 class="text-xl font-bold">最新职位</h2>
            <p class="text-gray-500 text-sm">完全免费，人工审核，保护隐私</p>
        </div>

        <div id="jobList" class="space-y-4">
            <p class="text-center text-gray-400 py-10">正在加载靠谱职位...</p>
        </div>
    </main>

    <div id="postModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 overflow-y-auto max-h-[90vh]">
            <h3 class="text-xl font-bold mb-4">免费发布招聘</h3>
            <form id="jobForm" class="space-y-4">
                <input type="text" id="j_title" placeholder="职位名称（如：餐馆领班）" class="w-full border p-3 rounded-xl" required>
                <input type="text" id="j_company" placeholder="店名/公司名" class="w-full border p-3 rounded-xl" required>
                <input type="text" id="j_salary" placeholder="薪资（如：5000-6000包吃住）" class="w-full border p-3 rounded-xl">
                <input type="text" id="j_location" placeholder="工作地点" class="w-full border p-3 rounded-xl">
                <textarea id="j_desc" placeholder="职位要求" class="w-full border p-3 rounded-xl"></textarea>
                <input type="text" id="j_contact" placeholder="联系方式（手机/微信，初始对求职者隐藏）" class="w-full border p-3 rounded-xl" required>
                <button type="submit" class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold">立即发布</button>
                <button type="button" onclick="hideModals()" class="w-full text-gray-400">取消</button>
            </form>
        </div>
    </div>

    <div id="applyModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl w-full max-w-md p-6">
            <h3 class="text-xl font-bold mb-4">投递资料</h3>
            <p class="text-sm text-gray-500 mb-4 font-bold">您的手机号将对雇主隐藏，直到您同意交换。</p>
            <form id="applyForm" class="space-y-4">
                <input type="hidden" id="target_job_id">
                <input type="text" id="r_name" placeholder="您的姓名/称呼" class="w-full border p-3 rounded-xl" required>
                <input type="tel" id="r_phone" placeholder="手机号码" class="w-full border p-3 rounded-xl" required>
                <textarea id="r_exp" placeholder="简单介绍一下你的经验" class="w-full border p-3 rounded-xl" required></textarea>
                <button type="submit" class="w-full bg-black text-white py-3 rounded-xl font-bold">提交申请</button>
                <button type="button" onclick="hideModals()" class="w-full text-gray-400">取消</button>
            </form>
        </div>
    </div>

    <script>
        // 配置你的 Supabase
        const SB_URL = "https://jhzpmmdslymynrhhikyl.supabase.co"; 
        const SB_KEY = "sb_publishable_b6QotGyfQzDeABQeZaWZcQ_nzRLqeCf";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // 1. 获取职位列表并渲染
        async function loadJobs() {
            const { data: jobs, error } = await supabaseClient
                .from('jobs')
                .select('*')
                .order('created_at', { ascending: false });

            const list = document.getElementById('jobList');
            list.innerHTML = '';

            jobs.forEach(job => {
                const card = `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                        <div class="flex justify-between items-start">
                            <h3 class="font-bold text-lg">${job.title}</h3>
                            <span class="text-orange-600 font-black">${job.salary}</span>
                        </div>
                        <p class="text-gray-500 text-sm mt-1">${job.company} · ${job.location}</p>
                        <div class="mt-4 flex justify-between items-center">
                            <span class="text-xs text-gray-400">${job.is_verified ? '✅ 已核验' : '⏳ 待审核'}</span>
                            <button onclick="openApply('${job.id}')" class="bg-black text-white px-4 py-1.5 rounded-full text-xs font-bold">申请</button>
                        </div>
                    </div>
                `;
                list.innerHTML += card;
            });
        }

        // 2. 提交职位
        document.getElementById('jobForm').onsubmit = async (e) => {
            e.preventDefault();
            const { error } = await supabaseClient.from('jobs').insert([{
                title: document.getElementById('j_title').value,
                company: document.getElementById('j_company').value,
                salary: document.getElementById('j_salary').value,
                location: document.getElementById('j_location').value,
                description: document.getElementById('j_desc').value,
                contact_info: document.getElementById('j_contact').value
            }]);
            if(!error) { alert('发布成功，请等待审核！'); location.reload(); }
        };

        // 3. 提交简历
        document.getElementById('applyForm').onsubmit = async (e) => {
            e.preventDefault();
            const { error } = await supabaseClient.from('resumes').insert([{
                job_id: document.getElementById('target_job_id').value,
                real_name: document.getElementById('r_name').value,
                phone: document.getElementById('r_phone').value,
                experience: document.getElementById('r_exp').value
            }]);
            if(!error) { alert('投递成功！资料已脱敏保护。'); hideModals(); }
        };

        // 界面控制逻辑
        function showPostJob() { document.getElementById('postModal').classList.remove('hidden'); }
        function openApply(id) { 
            document.getElementById('target_job_id').value = id;
            document.getElementById('applyModal').classList.remove('hidden'); 
        }
        function hideModals() {
            document.getElementById('postModal').classList.add('hidden');
            document.getElementById('applyModal').classList.add('hidden');
        }

        loadJobs();
    </script>
</body>
</html>
